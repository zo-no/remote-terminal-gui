<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>心脏复苏器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --muted: #555;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --purple: #a78bfa;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'PingFang SC', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── 顶部 ── */
#header {
  background: linear-gradient(135deg, #1a0a0a, #0a1a1a);
  border-bottom: 1px solid #2a1a1a;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
#pulse-icon {
  width: 28px; height: 28px;
  background: var(--red);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #fff;
  animation: pulse-glow 2s infinite;
}
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 5px var(--red), 0 0 10px var(--red); }
  50% { box-shadow: 0 0 15px var(--red), 0 0 25px var(--red); }
}
#title { font-size: 16px; font-weight: 600; flex: 1; }
#status { font-size: 12px; color: var(--muted); }

/* ── 快捷命令 ── */
#quickbar {
  background: #111;
  border-bottom: 1px solid var(--border);
  padding: 10px 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  flex-shrink: 0;
}
.quick-btn {
  background: linear-gradient(135deg, #1a2a1a, #0a1a0a);
  border: 1px solid #2a4a2a;
  color: var(--green);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.quick-btn:hover { background: #1a3a1a; border-color: #3a6a3a; }
.quick-btn:active { transform: scale(0.96); }
.quick-btn.danger {
  background: linear-gradient(135deg, #2a1a1a, #1a0a0a);
  border-color: #4a2a2a;
  color: var(--red);
}
.quick-btn.danger:hover { background: #3a1a1a; border-color: #6a3a3a; }
.quick-btn:disabled { opacity: 0.4; pointer-events: none; }

/* ── 输出区 ── */
#output {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  background: #050505;
  font-family: 'Menlo', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.5;
}
#output::-webkit-scrollbar { width: 4px; }
#output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.entry { border-bottom: 1px solid #151515; }
.cmd-line {
  display: flex; align-items: baseline; gap: 8px;
  padding: 10px 14px 8px;
  background: #0a0a0a;
  position: sticky; top: 0; z-index: 1;
}
.prompt { color: var(--green); font-size: 12px; flex-shrink: 0; }
.cmd-text { color: #e0e0e0; flex: 1; word-break: break-all; }
.badge {
  font-size: 10px; padding: 2px 8px; border-radius: 4px;
  flex-shrink: 0; font-weight: 500;
}
.badge.running { color: var(--yellow); background: #2a2a00; animation: pulse 1s infinite; }
.badge.ok { color: var(--green); background: #002a00; }
.badge.err { color: var(--red); background: #2a0000; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

.out {
  padding: 8px 14px 12px;
  color: #aaa;
  white-space: pre-wrap;
  word-break: break-all;
}
.out .stderr { color: var(--red); }

/* ── 输入栏 ── */
#inputbar {
  background: #0a0a0a;
  border-top: 1px solid var(--border);
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
#prompt { color: var(--green); font-family: 'Menlo', monospace; font-size: 13px; flex-shrink: 0; }
#input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 13px;
  font-family: 'Menlo', monospace;
  caret-color: var(--green);
}
#input::placeholder { color: var(--muted); }
#cancel-btn {
  background: none;
  border: 1px solid #4a2a2a;
  color: var(--red);
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
  display: none;
}
#cancel-btn.visible { display: block; }
#run-btn {
  background: #1a3a1a;
  border: none;
  color: var(--green);
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
}
#run-btn:disabled { opacity: 0.4; }
</style>
</head>
<body>

<div id="header">
  <div id="pulse-icon">⚡</div>
  <div id="title">心脏复苏器</div>
  <div id="status">连接中...</div>
</div>

<div id="quickbar">
  <button class="quick-btn" data-cmd="openclaw doctor">doctor</button>
  <button class="quick-btn" data-cmd="openclaw gateway restart">gateway restart</button>
  <button class="quick-btn" data-cmd="openclaw gateway status">gateway status</button>
  <button class="quick-btn" data-cmd="openclaw list">list</button>
  <button class="quick-btn" data-cmd="openclaw logs --tail 50">logs</button>
  <button class="quick-btn" data-cmd="openclaw version">version</button>
  <button class="quick-btn danger" data-cmd="openclaw restart">restart</button>
</div>

<div id="output"></div>

<div id="inputbar">
  <span id="prompt">$</span>
  <input id="input" type="text" placeholder="输入命令..." autocomplete="off" autocorrect="off" spellcheck="false">
  <button id="cancel-btn">取消</button>
  <button id="run-btn">↵</button>
</div>

<script>
const output = document.getElementById('output');
const input = document.getElementById('input');
const runBtn = document.getElementById('run-btn');
const cancelBtn = document.getElementById('cancel-btn');
const statusEl = document.getElementById('status');
const quickBtns = document.querySelectorAll('.quick-btn');

let ws = null;
let activeEntry = null;
let running = false;

// ── WebSocket ──
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const token = new URLSearchParams(location.search).get('token');
  if (!token) { statusEl.textContent = '缺少 token'; return; }

  ws = new WebSocket(`${proto}//${location.host}/ws?token=${token}`);

  ws.onopen = () => { statusEl.textContent = '已连接'; statusEl.style.color = '#4ade80'; };
  ws.onclose = () => { statusEl.textContent = '断开'; statusEl.style.color = '#f87171'; setTimeout(connect, 2000); };
  ws.onerror = () => ws.close();

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'start') {
      activeEntry = createEntry(msg.cmd);
      running = true;
      updateUI();
    }
    if (msg.type === 'out' && activeEntry) {
      appendOut(activeEntry, msg.data, msg.stderr);
    }
    if (msg.type === 'done') {
      if (activeEntry) {
        finishEntry(activeEntry, msg.code);
        activeEntry = null;
      }
      running = false;
      updateUI();
    }
  };
}

// ── UI ──
function createEntry(cmd) {
  const el = document.createElement('div');
  el.className = 'entry';
  el.innerHTML = `
    <div class="cmd-line">
      <span class="prompt">$</span>
      <span class="cmd-text">${esc(cmd)}</span>
      <span class="badge running">运行中</span>
    </div>
    <div class="out"></div>
  `;
  output.appendChild(el);
  output.scrollTop = output.scrollHeight;
  return el;
}
function appendOut(entry, text, isStderr) {
  const out = entry.querySelector('.out');
  const span = document.createElement('span');
  if (isStderr) span.className = 'stderr';
  span.textContent = text;
  out.appendChild(span);
  output.scrollTop = output.scrollHeight;
}
function finishEntry(entry, code) {
  const badge = entry.querySelector('.badge');
  if (code === 0 || code === null) {
    badge.textContent = '✓'; badge.className = 'badge ok';
  } else {
    badge.textContent = `✗ ${code}`; badge.className = 'badge err';
  }
}
function updateUI() {
  runBtn.disabled = running;
  cancelBtn.classList.toggle('visible', running);
  quickBtns.forEach(b => b.disabled = running);
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── 执行 ──
function run(cmd) {
  if (!cmd || !ws || ws.readyState !== 1 || running) return;
  ws.send(JSON.stringify({ type: 'run', cmd }));
}
function cancel() {
  if (ws?.readyState === 1) ws.send(JSON.stringify({ type: 'cancel' }));
}

// ── 事件 ──
runBtn.addEventListener('click', () => {
  const cmd = input.value.trim();
  if (cmd) { run(cmd); input.value = ''; }
});
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const cmd = input.value.trim();
    if (cmd) { run(cmd); input.value = ''; }
  }
});
cancelBtn.addEventListener('click', cancel);
quickBtns.forEach(btn => btn.addEventListener('click', () => run(btn.dataset.cmd)));

connect();
</script>
</body>
</html>
