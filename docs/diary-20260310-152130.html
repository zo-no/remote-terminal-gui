<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>今日日记 📝</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f7; --surface: #fff; --border: #e5e5e5;
  --text: #1d1d1f; --muted: #86868b; --accent: #0071e3;
  --radius: 16px; --danger: #ff3b30; --success: #34c759;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0d0d0d; --surface: #1c1c1e; --border: #38383a;
    --text: #f5f5f7; --muted: #98989d; --accent: #0a84ff;
    --danger: #ff453a; --success: #30d158;
  }
}
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, 'PingFang SC', 'SF Pro', sans-serif;
  min-height: 100dvh;
}
.container { max-width: 520px; margin: 0 auto; padding: 24px 16px 60px; }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

.form-group { margin-bottom: 20px; }
label {
  display: block; font-size: 14px; font-weight: 600;
  margin-bottom: 8px; color: var(--text);
}
.hint { font-size: 12px; color: var(--muted); margin-top: 4px; }

input[type=text], input[type=date], select, textarea {
  width: 100%; padding: 12px 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; font-size: 16px; color: var(--text);
  font-family: inherit; outline: none; transition: border-color 0.2s;
  -webkit-appearance: none;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
}
textarea { min-height: 120px; resize: vertical; line-height: 1.6; }

.mood-selector {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.mood-btn {
  padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--surface); font-size: 16px; cursor: pointer;
  transition: all 0.2s;
}
.mood-btn.active {
  border-color: var(--accent); background: var(--accent); color: #fff;
}
.mood-btn:hover { border-color: var(--accent); }

.tags-input {
  display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; min-height: 44px; align-items: center;
}
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--accent); color: #fff; padding: 4px 10px;
  border-radius: 12px; font-size: 13px;
}
.tag .remove { cursor: pointer; opacity: 0.7; }
.tag .remove:hover { opacity: 1; }
.tags-input input {
  border: none; background: transparent; padding: 4px;
  flex: 1; min-width: 80px; font-size: 14px;
}

.submit-btn {
  width: 100%; padding: 16px; border: none; border-radius: 14px;
  background: var(--accent); color: #fff; font-size: 17px; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s; margin-top: 8px;
}
.submit-btn:hover { opacity: 0.9; }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.result {
  text-align: center; padding: 60px 20px;
}
.result .icon { font-size: 64px; margin-bottom: 16px; }
.result h2 { font-size: 22px; margin-bottom: 8px; }
.result p { color: var(--muted); font-size: 15px; }

.energy-bar {
  display: flex; gap: 4px; align-items: center;
}
.energy-dot {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--border); cursor: pointer;
  transition: all 0.2s; display: flex; align-items: center;
  justify-content: center; font-size: 12px;
}
.energy-dot.active { border-color: var(--accent); background: var(--accent); color: #fff; }
.energy-label { font-size: 12px; color: var(--muted); margin-left: 8px; }

.powered { text-align: center; color: var(--muted); font-size: 12px; margin-top: 32px; }
</style>
</head>
<body>
<div class="container">
  <h1>今日日记 📝</h1>
  <div class="subtitle" id="dateLabel"></div>

  <form id="diaryForm">
    <div class="form-group">
      <label>心情</label>
      <div class="mood-selector" id="moodSelector">
        <button type="button" class="mood-btn" data-mood="😊 开心">😊 开心</button>
        <button type="button" class="mood-btn" data-mood="😌 平静">😌 平静</button>
        <button type="button" class="mood-btn" data-mood="😤 烦躁">😤 烦躁</button>
        <button type="button" class="mood-btn" data-mood="😢 低落">😢 低落</button>
        <button type="button" class="mood-btn" data-mood="🤩 兴奋">🤩 兴奋</button>
        <button type="button" class="mood-btn" data-mood="😴 疲惫">😴 疲惫</button>
      </div>
    </div>

    <div class="form-group">
      <label>精力值</label>
      <div class="energy-bar" id="energyBar">
        <div class="energy-dot" data-val="1">1</div>
        <div class="energy-dot" data-val="2">2</div>
        <div class="energy-dot" data-val="3">3</div>
        <div class="energy-dot" data-val="4">4</div>
        <div class="energy-dot" data-val="5">5</div>
        <div class="energy-dot" data-val="6">6</div>
        <div class="energy-dot" data-val="7">7</div>
        <div class="energy-dot" data-val="8">8</div>
        <div class="energy-dot" data-val="9">9</div>
        <div class="energy-dot" data-val="10">10</div>
        <span class="energy-label" id="energyLabel">未选择</span>
      </div>
    </div>

    <div class="form-group">
      <label>今天做了什么？</label>
      <textarea name="work" placeholder="工作内容、完成的事情..."></textarea>
    </div>

    <div class="form-group">
      <label>生活记录</label>
      <textarea name="life" placeholder="生活中的事、感受..."></textarea>
    </div>

    <div class="form-group">
      <label>今日收获 / 反思</label>
      <textarea name="reflection" placeholder="学到了什么？有什么想法？" style="min-height:80px"></textarea>
    </div>

    <div class="form-group">
      <label>标签</label>
      <div class="tags-input" id="tagsContainer">
        <input type="text" id="tagInput" placeholder="输入后回车添加" />
      </div>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">提交日记 ✨</button>
  </form>

  <div class="result" id="result" style="display:none">
    <div class="icon">✅</div>
    <h2>日记已提交</h2>
    <p>CatClaw 🦘 正在保存你的日记...</p>
  </div>

  <div class="powered">Powered by CatClaw 🦘 × Web Form Skill</div>
</div>

<script>
// ── Config ──
const FORM_ID = "diary-20260310-152130";
const REPO = "zo-no/remote-terminal-gui";
// Token 从 URL 参数读取，不硬编码
const params = new URLSearchParams(window.location.search);
const GITHUB_TOKEN = params.get('t') || '';

// ── Date ──
const now = new Date();
document.getElementById('dateLabel').textContent =
  `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${['日','一','二','三','四','五','六'][now.getDay()]}`;

// ── Mood ──
let selectedMood = '';
document.querySelectorAll('.mood-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedMood = btn.dataset.mood;
  });
});

// ── Energy ──
let energy = 0;
document.querySelectorAll('.energy-dot').forEach(dot => {
  dot.addEventListener('click', () => {
    energy = parseInt(dot.dataset.val);
    document.querySelectorAll('.energy-dot').forEach(d => {
      d.classList.toggle('active', parseInt(d.dataset.val) <= energy);
    });
    const labels = ['','很差','差','偏低','一般','还行','不错','良好','很好','极佳','满格'];
    document.getElementById('energyLabel').textContent = labels[energy] || '';
  });
});

// ── Tags ──
const tags = [];
const tagInput = document.getElementById('tagInput');
const tagsContainer = document.getElementById('tagsContainer');

tagInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && tagInput.value.trim()) {
    e.preventDefault();
    const tag = tagInput.value.trim();
    if (!tags.includes(tag)) {
      tags.push(tag);
      renderTags();
    }
    tagInput.value = '';
  }
});

function renderTags() {
  tagsContainer.querySelectorAll('.tag').forEach(t => t.remove());
  tags.forEach((tag, i) => {
    const el = document.createElement('span');
    el.className = 'tag';
    el.innerHTML = `${tag} <span class="remove" onclick="removeTag(${i})">✕</span>`;
    tagsContainer.insertBefore(el, tagInput);
  });
}

window.removeTag = function(i) {
  tags.splice(i, 1);
  renderTags();
};

// ── Submit ──
document.getElementById('diaryForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '提交中...';

  const fd = new FormData(e.target);
  const data = {
    formId: FORM_ID,
    date: now.toISOString().split('T')[0],
    mood: selectedMood || '未选择',
    energy: energy || 0,
    work: fd.get('work') || '',
    life: fd.get('life') || '',
    reflection: fd.get('reflection') || '',
    tags: tags,
    submittedAt: new Date().toISOString()
  };

  try {
    const resp = await fetch(`https://api.github.com/repos/${REPO}/issues`, {
      method: 'POST',
      headers: {
        'Authorization': `token ${GITHUB_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        title: `[form-callback] ${FORM_ID}`,
        body: JSON.stringify(data, null, 2),
        labels: ['form-callback']
      })
    });

    if (resp.ok) {
      document.getElementById('diaryForm').style.display = 'none';
      document.getElementById('result').style.display = 'block';
    } else {
      const err = await resp.json();
      alert('提交失败: ' + (err.message || resp.status));
      btn.disabled = false;
      btn.textContent = '提交日记 ✨';
    }
  } catch (err) {
    alert('网络错误: ' + err.message);
    btn.disabled = false;
    btn.textContent = '提交日记 ✨';
  }
});
</script>
</body>
</html>
