<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Claude Remote</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface2: #222;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --muted: #555;
  --green: #4ade80;
  --blue: #60a5fa;
  --yellow: #fbbf24;
  --red: #f87171;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'PingFang SC', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── 侧边栏 ── */
#sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 260px;
  background: #111;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transform: translateX(-100%);
  transition: transform 0.25s ease;
  z-index: 100;
}
#sidebar.open { transform: translateX(0); }

#sidebar-header {
  padding: 16px 14px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#sidebar-header span { font-size: 13px; color: var(--muted); }
#new-session-btn {
  background: #1a3a22;
  border: 1px solid #2d6e3e;
  color: var(--green);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 12px;
  cursor: pointer;
}
#new-session-btn:active { opacity: 0.7; }

#session-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
}
#session-list::-webkit-scrollbar { display: none; }

.session-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 2px;
}
.session-item:hover { background: var(--surface); }
.session-item.active { background: #1a2a3a; }
.session-item-name {
  flex: 1;
  font-size: 13px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.session-item-count { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.session-del-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 4px;
  flex-shrink: 0;
  opacity: 0;
}
.session-item:hover .session-del-btn { opacity: 1; }
.session-del-btn:hover { color: var(--red); }

#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 99;
}
#overlay.visible { display: block; }

/* ── 顶部栏 ── */
#topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
#menu-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  padding: 2px 4px;
  line-height: 1;
}
#session-title {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--red);
  transition: background 0.3s;
  flex-shrink: 0;
}
#status-dot.connected { background: var(--green); }
#status-dot.thinking { background: var(--yellow); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── 快捷按钮 ── */
#quickbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 6px 10px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
}
#quickbar::-webkit-scrollbar { display: none; }
.quick-btn {
  background: var(--border);
  color: #ccc;
  border: none;
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 13px;
  white-space: nowrap;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.quick-btn:active { opacity: 0.6; }

/* ── 消息列表 ── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  -webkit-overflow-scrolling: touch;
}
.msg {
  max-width: 88%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.user {
  align-self: flex-end;
  background: #1a3a5c;
  color: #e0f0ff;
  border-bottom-right-radius: 4px;
}
.msg.assistant {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg.tool {
  align-self: flex-start;
  background: #111;
  color: #8888cc;
  border: 1px solid #222244;
  border-radius: 8px;
  font-size: 12px;
  font-family: 'Menlo', monospace;
  max-width: 95%;
}
.msg.system {
  align-self: center;
  color: var(--muted);
  font-size: 12px;
  padding: 4px 8px;
}

/* ── 输入区 ── */
#inputbar {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px;
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
}
#input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 15px;
  padding: 10px 14px;
  resize: none;
  max-height: 120px;
  min-height: 42px;
  line-height: 1.4;
  font-family: inherit;
  outline: none;
}
#input:focus { border-color: #3a5a8a; }
#send-btn {
  background: #1a4a8a;
  border: none;
  border-radius: 10px;
  width: 42px; height: 42px;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
#send-btn:active { opacity: 0.7; }
#send-btn:disabled { background: #222; color: var(--muted); }
#cancel-btn {
  background: #3a1a1a;
  border: none;
  border-radius: 10px;
  width: 42px; height: 42px;
  color: var(--red);
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
  display: none;
  align-items: center;
  justify-content: center;
}
#cancel-btn.visible { display: flex; }
#cancel-btn:active { opacity: 0.7; }
</style>
</head>
<body>

<!-- 侧边栏遮罩 -->
<div id="overlay"></div>

<!-- 侧边栏 -->
<div id="sidebar">
  <div id="sidebar-header">
    <span>会话列表</span>
    <button id="new-session-btn">+ 新建</button>
  </div>
  <div id="session-list"></div>
</div>

<!-- 顶部栏 -->
<div id="topbar">
  <button id="menu-btn">☰</button>
  <div id="session-title">加载中...</div>
  <div id="status-dot"></div>
</div>

<!-- 快捷按钮 -->
<div id="quickbar">
  <button class="quick-btn" data-text="你好，介绍一下你自己">打招呼</button>
  <button class="quick-btn" data-text="ls -la">ls</button>
  <button class="quick-btn" data-text="pwd">pwd</button>
  <button class="quick-btn" data-text="git status">git status</button>
  <button class="quick-btn" data-text="git log --oneline -10">git log</button>
  <button class="quick-btn" data-text="帮我看一下当前目录有什么文件">查看目录</button>
</div>

<!-- 消息 -->
<div id="messages"></div>

<!-- 输入 -->
<div id="inputbar">
  <textarea id="input" placeholder="输入消息..." rows="1"></textarea>
  <button id="cancel-btn" title="取消">✕</button>
  <button id="send-btn">↑</button>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const cancelBtn = document.getElementById('cancel-btn');
const statusDot = document.getElementById('status-dot');
const sessionTitle = document.getElementById('session-title');
const sessionList = document.getElementById('session-list');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

let ws = null;
let isThinking = false;
let currentAssistantEl = null;
let activeSessions = [];
let activeSessionId = null;

// ── 侧边栏 ──
document.getElementById('menu-btn').addEventListener('click', () => {
  sidebar.classList.add('open');
  overlay.classList.add('visible');
});
overlay.addEventListener('click', closeSidebar);
function closeSidebar() {
  sidebar.classList.remove('open');
  overlay.classList.remove('visible');
}

document.getElementById('new-session-btn').addEventListener('click', () => {
  if (ws?.readyState === 1) ws.send(JSON.stringify({ type: 'session_new' }));
  closeSidebar();
});

function renderSessions() {
  sessionList.innerHTML = '';
  for (const s of activeSessions) {
    const item = document.createElement('div');
    item.className = 'session-item' + (s.id === activeSessionId ? ' active' : '');
    item.innerHTML = `
      <div class="session-item-name">${s.name}</div>
      <div class="session-item-count">${s.messageCount > 0 ? s.messageCount + '条' : ''}</div>
      <button class="session-del-btn" data-id="${s.id}" title="删除">✕</button>
    `;
    item.addEventListener('click', (e) => {
      if (e.target.classList.contains('session-del-btn')) {
        const id = e.target.dataset.id;
        if (confirm('删除此会话？')) {
          ws.send(JSON.stringify({ type: 'session_delete', sessionId: id }));
        }
        return;
      }
      ws.send(JSON.stringify({ type: 'session_switch', sessionId: s.id }));
      closeSidebar();
    });
    sessionList.appendChild(item);
  }
}

// ── 消息 ──
function addMsg(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.textContent = text;
  messagesEl.appendChild(el);
  scrollBottom();
  return el;
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function setStatus(cls, text) {
  statusDot.className = cls;
}

function setThinking(v) {
  isThinking = v;
  sendBtn.disabled = v;
  cancelBtn.classList.toggle('visible', v);
  if (!v) currentAssistantEl = null;
}

function loadHistory(history) {
  messagesEl.innerHTML = '';
  for (const h of history) {
    addMsg(h.role, h.text);
  }
}

// ── WebSocket ──
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => setStatus('connected', '已连接');

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'init') {
      activeSessions = msg.sessions;
      activeSessionId = msg.activeId;
      renderSessions();
      const s = activeSessions.find(s => s.id === activeSessionId);
      if (s) sessionTitle.textContent = s.name;
      setStatus('connected', '已连接');
      return;
    }

    if (msg.type === 'sessions_updated') {
      activeSessions = msg.sessions;
      activeSessionId = msg.activeId;
      renderSessions();
      const s = activeSessions.find(s => s.id === activeSessionId);
      if (s) sessionTitle.textContent = s.name;
      return;
    }

    if (msg.type === 'session_switched') {
      activeSessionId = msg.sessionId;
      const s = activeSessions.find(s => s.id === activeSessionId);
      if (s) sessionTitle.textContent = s.name;
      setThinking(false);
      loadHistory(msg.history || []);
      renderSessions();
      return;
    }

    if (msg.type === 'status') {
      if (msg.text === 'thinking') { setStatus('thinking'); setThinking(true); currentAssistantEl = null; }
      else if (msg.text === 'done') { setStatus('connected'); setThinking(false); }
      else if (msg.text === 'error') { setStatus('connected'); setThinking(false); addMsg('system', '⚠️ 出错了，请重试'); }
      else if (msg.text === 'cancelled') { setStatus('connected'); setThinking(false); addMsg('system', '已取消'); }
      return;
    }

    if (msg.type === 'assistant') {
      if (!currentAssistantEl) currentAssistantEl = addMsg('assistant', '');
      currentAssistantEl.textContent += msg.text;
      scrollBottom();
      return;
    }

    if (msg.type === 'tool_use') {
      addMsg('tool', `🔧 ${msg.name}\n${msg.input}`);
      return;
    }
  };

  ws.onclose = () => {
    setStatus('', '断开');
    setThinking(false);
    setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
}

// ── 发送 ──
function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isThinking || !ws || ws.readyState !== 1) return;
  addMsg('user', text);
  ws.send(JSON.stringify({ type: 'send', text }));
  inputEl.value = '';
  inputEl.style.height = 'auto';
}

sendBtn.addEventListener('click', sendMessage);
cancelBtn.addEventListener('click', () => {
  if (ws?.readyState === 1) ws.send(JSON.stringify({ type: 'cancel' }));
});

document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    inputEl.value = btn.dataset.text;
    sendMessage();
  });
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

connect();
</script>
</body>
</html>
